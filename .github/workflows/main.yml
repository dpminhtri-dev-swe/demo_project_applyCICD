name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào Docker Hub (sử dụng Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 3: Build và push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile           # nếu Dockerfile nằm ở thư mục gốc, giữ nguyên
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/duongphamminhtri-app:latest
            # Nếu muốn thêm tag khác (ví dụ theo commit SHA hoặc version):
            # ${{ secrets.DOCKERHUB_USERNAME }}/duongphamminhtri-app:${{ github.sha }}
